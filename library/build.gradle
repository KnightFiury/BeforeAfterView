plugins {
    id 'com.android.library'
    id 'maven-publish'
}

android {
    namespace 'com.knightfiury.slidable'
    compileSdk 34

    defaultConfig {
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    publishing {
        singleVariant('release') {
            withSourcesJar()
        }
    }
}

afterEvaluate {
    publishing {
        publications {
            release(MavenPublication) {
                from components.release
                groupId    = 'com.github.KnightFiury'
                artifactId = 'CompareView'
                version    = '1.0.0'
            }
        }
    }
}

dependencies {
    compileOnly 'androidx.appcompat:appcompat:1.6.1'
}
